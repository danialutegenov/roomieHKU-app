{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RoomieHKU Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-shell">
        <div class="site-nav-row">
          <a href="{% url 'core:dashboard_home' %}" class="site-brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <span>
              <span class="brand-text">RoomieHKU Dashboard</span>
              <span class="brand-sub">Moderation + Insights</span>
            </span>
          </a>

          <button
            class="mobile-toggle"
            type="button"
            data-mobile-toggle="dashboard-menu"
            aria-expanded="false"
            aria-controls="dashboard-menu"
          >
            Menu
          </button>

          <div class="site-menu" id="dashboard-menu">
            <nav class="nav-links" aria-label="Dashboard navigation">
              <a href="{% url 'core:dashboard_home' %}" class="nav-link" data-nav-link>Overview</a>
              <a href="{% url 'core:listing_list' %}" class="nav-link" data-nav-link>Student App</a>
              <a href="{% url 'admin:index' %}" class="nav-link">Django Admin</a>
            </nav>

            <div class="nav-actions">
              <div class="theme-switch" role="group" aria-label="Theme switch">
                <button class="theme-option" type="button" data-theme-option="light" aria-pressed="false">Light</button>
                <button class="theme-option" type="button" data-theme-option="dark" aria-pressed="false">Dark</button>
                <button class="theme-option" type="button" data-theme-option="system" aria-pressed="false">Auto</button>
              </div>
              {% if user.is_authenticated %}
                <form method="post" action="{% url 'core:logout' %}" class="inline-form">
                  {% csrf_token %}
                  <button type="submit" class="btn btn-secondary">Log Out</button>
                </form>
              {% endif %}
            </div>
          </div>
        </div>
      </div>
    </header>

    {% if messages %}
      <section class="flash-list" aria-live="polite">
        {% for message in messages %}
          <p class="flash-msg {{ message.tags|default:'' }}">{{ message }}</p>
        {% endfor %}
      </section>
    {% endif %}

    {% block content %}{% endblock %}

    <script src="{% static 'core/js/main.js' %}"></script>
  </body>
</html>
