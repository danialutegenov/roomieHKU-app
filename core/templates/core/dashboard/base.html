{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RoomieHKU Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}" />
  </head>
  <body class="bg-slate-100 text-slate-900">
    <header class="border-b border-slate-200 bg-white">
      <nav class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
        <a href="{% url 'core:dashboard_home' %}" class="text-lg font-semibold">RoomieHKU Dashboard</a>
        <div class="flex items-center gap-4 text-sm">
          <a href="{% url 'core:listing_list' %}" class="hover:text-slate-600">Student App</a>
          <a href="{% url 'admin:index' %}" class="hover:text-slate-600">Django Admin</a>
          {% if user.is_authenticated %}
            <form method="post" action="{% url 'core:logout' %}">
              {% csrf_token %}
              <button type="submit" class="rounded bg-slate-900 px-3 py-1.5 text-white">Log Out</button>
            </form>
          {% endif %}
        </div>
      </nav>
    </header>
    {% block content %}{% endblock %}
    <script src="{% static 'core/js/main.js' %}"></script>
  </body>
</html>
