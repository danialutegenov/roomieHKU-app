{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RoomieHKU App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}" />
  </head>
  <body class="bg-slate-50 text-slate-900">
    <header class="border-b border-slate-200 bg-white">
      <nav class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">
        <a href="{% url 'core:listing_list' %}" class="text-lg font-semibold">RoomieHKU</a>
        <div class="flex items-center gap-4 text-sm">
          <a href="{% url 'core:listing_list' %}" class="hover:text-slate-600">Listings</a>
          {% if user.is_authenticated %}
            <a href="{% url 'core:listing_create' %}" class="hover:text-slate-600">New Listing</a>
            <a href="{% url 'core:profile_edit' %}" class="hover:text-slate-600">Profile</a>
            <form method="post" action="{% url 'core:logout' %}">
              {% csrf_token %}
              <button type="submit" class="rounded bg-slate-900 px-3 py-1.5 text-white">Log Out</button>
            </form>
          {% else %}
            <a href="{% url 'core:login' %}" class="hover:text-slate-600">Log In</a>
            <a href="{% url 'core:signup' %}" class="rounded bg-slate-900 px-3 py-1.5 text-white">Sign Up</a>
          {% endif %}
        </div>
      </nav>
    </header>
    {% if messages %}
      <section class="mx-auto mt-4 max-w-5xl px-6">
        {% for message in messages %}
          <p class="mb-2 rounded bg-emerald-100 px-3 py-2 text-sm text-emerald-800">{{ message }}</p>
        {% endfor %}
      </section>
    {% endif %}
    {% block content %}{% endblock %}
    <script src="{% static 'core/js/main.js' %}"></script>
  </body>
</html>
