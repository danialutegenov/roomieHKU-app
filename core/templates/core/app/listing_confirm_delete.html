{% extends 'core/app/base.html' %}

{% block content %}
<main class="page-shell">
  <section class="panel" style="max-width: 620px; margin-inline: auto;">
    <h1>Delete Listing</h1>
    <p class="mt-2 text-secondary">
      This action will permanently remove <strong>{{ post.title }}</strong> from the platform.
      It cannot be undone.
    </p>

    <form method="post" class="card-actions mt-4">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Delete Listing</button>
      <a href="{% url 'core:listing_detail' post.pk %}" class="btn btn-ghost">Cancel</a>
    </form>
  </section>
</main>
{% endblock %}
