{% extends 'core/app/base.html' %}

{% block content %}
<main class="mx-auto max-w-xl px-6 py-10">
  <div class="rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
    <h1 class="text-xl font-semibold">Delete Listing</h1>
    <p class="mt-3 text-sm text-slate-700">Are you sure you want to delete "{{ post.title }}"?</p>
    <form method="post" class="mt-6 flex items-center gap-3">
      {% csrf_token %}
      <button type="submit" class="rounded bg-red-600 px-4 py-2 text-white">Delete</button>
      <a href="{% url 'core:listing_detail' post.pk %}" class="text-sm text-slate-600 underline">Cancel</a>
    </form>
  </div>
</main>
{% endblock %}
