{% extends 'core/app/base.html' %}

{% block content %}
<main class="mx-auto max-w-2xl px-6 py-10">
  <h1 class="text-2xl font-bold">Edit Profile</h1>
  <form method="post" class="mt-6 space-y-4 rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <div>
        <label class="mb-1 block text-sm font-medium">{{ field.label }}</label>
        {{ field }}
        {{ field.errors }}
      </div>
    {% endfor %}
    <button type="submit" class="rounded bg-slate-900 px-4 py-2 text-white">Update Profile</button>
  </form>
</main>
{% endblock %}
